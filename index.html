  <!-- Video Section -->

  <!-- Contact Section -->
  <section id="contact-section" class="bg-[#b4955f] py-10">
    <div class="container mx-auto px-6 text-center">
      <h2 class="text-3xl font-bold text-white mb-6">Neem contact met ons op</h2>
      <p class="text-lg text-white mb-6">Heb je vragen of wil je meer informatie? Laat het ons weten!</p>

      <form action="./php/send-email.php" method="POST" class="contact-form">
        <div class="grid grid-cols-1 gap-4">
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Naam</label>
            <input type="text" id="name" name="name" required class="w-full mt-2 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#b4955f]">
          </div>
          <div>
            <label for="phone" class="block text-sm font-medium text-gray-700">Telefoonnummer</label>
            <input type="tel" id="phone" name="phone" required class="w-full mt-2 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#b4955f]">
          </div>
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
            <input type="email" id="email" name="email" required class="w-full mt-2 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#b4955f]">
          </div>
          <div>
            <label for="message" class="block text-sm font-medium text-gray-700">Bericht</label>
            <textarea id="message" name="message" required rows="4" class="w-full mt-2 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#b4955f]"></textarea>
          </div>
          <div class="mt-4">
            <button type="submit" class="send-button w-full py-2 px-4 text-lg font-bold rounded-md">Verzenden</button>
          </div>
        </div>
      </form>
    </div>
  </section>

    <!-- Scroll to Top Button -->
    <button 
    id="scrollToTopButton" 
    class="hidden fixed bottom-6 right-6 z-50 w-12 h-12 bg-[#6a734a]   text-white rounded-full shadow-lg flex items-center justify-center focus:outline-none focus:ring focus:ring-blue-300"
  >
    ↑
  </button>

  <!-- JavaScript Smooth Scroll -->
  <script>
    // Voeg een click event listener toe voor de pijltjeslink
    document.getElementById('scroll-to-video').addEventListener('click', function() {
      const target = document.getElementById('video-section');
      target.scrollIntoView({ behavior: 'smooth' });
    });

    const scrollToTopButton = document.getElementById('scrollToTopButton');

// Show the button when scrolled down 200px
window.addEventListener('scroll', () => {
  if (window.scrollY > 200) {
    scrollToTopButton.classList.remove('hidden');
  } else {
    scrollToTopButton.classList.add('hidden');
  }
});

// Scroll to top when the button is clicked
scrollToTopButton.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
  </script>
